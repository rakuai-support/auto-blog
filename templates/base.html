<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="xq2Wicedua7rwzz4MrzjFmLgCvCU9ZIT-cl3uNYukho">
  <title>{{html_title}}</title>
  <meta name="description" content="{{meta_description}}">
  <link rel="canonical" href="{{canonical_url}}">
  <!-- OGP -->
  <meta property="og:title" content="{{html_title}}">
  <meta property="og:description" content="{{meta_description}}">
  <meta property="og:type" content="{{og_type}}">
  <meta property="og:url" content="{{canonical_url}}">
  <meta property="og:site_name" content="{{site_name}}">
  <meta property="og:locale" content="ja_JP">
  <meta property="og:image" content="https://rakuai-support.github.io/auto-blog/ogp.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{html_title}}">
  <meta name="twitter:description" content="{{meta_description}}">
  <meta name="twitter:image" content="https://rakuai-support.github.io/auto-blog/ogp.png">
  {{analytics_tag}}
  <!-- フォント -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{root_path}}style.css">
  {{structured_data}}
  <!-- Google AdSense -->
  <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=YOUR_ADSENSE_ID" crossorigin="anonymous"></script> -->
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-top">
        <a href="{{root_path}}index.html" class="logo">{{site_name}}</a>
        <nav class="header-nav">
          <a href="{{root_path}}index.html">記事一覧</a>
          <a href="https://www.smilefactory-rakuai.com/" target="_blank" rel="noopener" class="nav-cta">無料相談</a>
        </nav>
      </div>
      <p class="tagline">{{site_description}}</p>
    </div>
  </header>
  <main>
    {{breadcrumb}}
    {{content}}
  </main>
  <footer>
    <div class="footer-inner">
      <div class="footer-links">
        <a href="{{root_path}}index.html">記事一覧</a>
        <a href="https://www.smilefactory-rakuai.com/" target="_blank" rel="noopener">かわさき楽AIサポート</a>
        <a href="{{root_path}}sitemap.xml">サイトマップ</a>
      </div>
      <p class="footer-copy">&copy; 2026 {{site_name}} / <a href="https://www.smilefactory-rakuai.com/" target="_blank" rel="noopener">株式会社スマイルファクトリー</a></p>
    </div>
  </footer>
</body>
</html>
